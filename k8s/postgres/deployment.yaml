# k8s/postgres/deployment.yaml
# ─────────────────────────────────────────────────────────────
# Single-replica PostgreSQL deployment.
# Uses Recreate strategy because the PVC is ReadWriteOnce.
# ─────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate                    # ← can't do rolling update with RWO PVC
    #     ↑ Kills old pod THEN starts new one (brief downtime on update)
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          envFrom:
            - secretRef:
                name: postgres-secret
                # ↑ Injects POSTGRES_DB, POSTGRES_USER, POSTGRES_PASSWORD
                #   as environment variables into the container
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
              subPath: pgdata
              # ↑ subPath avoids the "lost+found" directory issue.
              #   Without it, PostgreSQL fails because the directory
              #   isn't empty (EBS volumes create lost+found).
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
              # ↑ PostgreSQL runs all .sql files here on first boot
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "greetuser", "-d", "greetingdb"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "greetuser", "-d", "greetingdb"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: init-sql
          configMap:
            name: postgres-init-sql
