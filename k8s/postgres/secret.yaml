# k8s/postgres/secret.yaml
# ─────────────────────────────────────────────────────────────
# Database credentials. stringData lets you write plain text —
# Kubernetes base64-encodes it automatically.
#
# ⚠️ For production: use SealedSecrets or External Secrets Operator
# ─────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  labels:
    app: postgres
type: Opaque
stringData:                                 # ← plain text, auto-encoded
  POSTGRES_DB: greetingdb
  POSTGRES_USER: greetuser
  POSTGRES_PASSWORD: greetpass123
