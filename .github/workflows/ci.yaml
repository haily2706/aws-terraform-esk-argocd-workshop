# .github/workflows/ci.yaml
# -────────────────────────────────────────────────────────────
# CI Pipeline: Build Docker image → Push to DockerHub →
# Update K8s manifest → ArgoCD auto-syncs to cluster
# -────────────────────────────────────────────────────────────

name: CI - Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - "app/**"                        # ← ONLY trigger when app code changes
      #   ↑ This prevents infinite loops!
      #     CI writes to k8s/ but only triggers on app/
      #     So manifest commits don't re-trigger CI

env:
  IMAGE_NAME: aws-terraform-esk-argocd-workshop

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: Prod                   # ← use secrets from Prod environment
    permissions:
      contents: write                   # ← needed to push manifest updates

    steps:
      # ── Step 1: Get the code ──────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # ↑ GITHUB_TOKEN is auto-provided by GitHub Actions
          #   It has write access to the current repo

      # ── Step 2: Set up Docker build system ────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # ↑ Buildx enables:
        #   - Build cache (speeds up subsequent builds)
        #   - Multi-platform builds (not needed here, but good practice)

      # ── Step 3: Authenticate with DockerHub ───────────────
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          # ↑ These secrets must be configured in GitHub repo settings

      # ── Step 4: Create a unique image tag ─────────────────
      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "full_image=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Image will be tagged: ${SHORT_SHA}"
        # ↑ Uses the git commit SHA as the image tag
        #   e.g., "a1b2c3d" — unique, traceable, immutable

      # ── Step 5: Build and push the Docker image ───────────
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./app                # ← build from app/ directory
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha          # ← use GitHub Actions cache
          cache-to: type=gha,mode=max   # ← save to GitHub Actions cache
        # ↑ Caching makes subsequent builds much faster
        #   Only changed layers are rebuilt

      # ── Step 6: Update the K8s manifest ───────────────────
      - name: Update K8s manifest
        run: |
          sed -i "s|image: .*aws-terraform-esk-argocd-workshop:.*|image: ${{ steps.meta.outputs.full_image }}|" \
            k8s/app/deployment.yaml

          echo "Updated deployment.yaml:"
          grep "image:" k8s/app/deployment.yaml
        # ↑ Replaces the image line in deployment.yaml
        #   Before: image: haily2706/aws-terraform-esk-argocd-workshop:old-tag
        #   After:  image: haily2706/aws-terraform-esk-argocd-workshop:a1b2c3d

      # ── Step 7: Commit and push the manifest change ───────
      - name: Commit and push manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/app/deployment.yaml

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: update greeting-app image to ${{ steps.meta.outputs.tag }}"
            git push
          fi
        # ↑ This is the "bridge" between CI and CD:
        #   CI pushes a manifest change → ArgoCD detects it → deploys
